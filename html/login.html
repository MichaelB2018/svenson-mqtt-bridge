<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#212529">
    <link rel="icon" sizes="192x192" href="ico_lg.png">
</head>

<body style="margin: 0; padding: 0;">
  <div class="container d-flex flex-column justify-content-center align-items-center">
    <div style="width: 100%; max-width: 300px;">    
        <h4 class="mb-4 text-center">Login</h4>
        <form method="POST">
            {% if error %}
            <div class="alert alert-danger text-center py-2" role="alert">{{ error }}</div>
            {% endif %}
            <div class="mb-3">
                <input type="password" name="password" class="form-control text-white"
                       style="background:#0e1015; border: 1px solid #c2c1c1;" placeholder="Enter Password" required autofocus>
            </div>
            <button type="submit"
                    style="background:#0e1015; border: 1px solid #c2c1c1; color: #fffeff;"
                    class="form-control buttoneffect py-2">
                Log In
            </button>
        </form>
        
    </div>
  </div>
</body>

</html>
